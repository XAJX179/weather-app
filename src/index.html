<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
  </head>
  <body>
    <h1>Weather</h1>
    <main>
      <form>
        <label for="location">Enter City:</label>
        <input
          type="search"
          name="location"
          id="location"
          placeholder="City name"
        />
        <input type="submit" />
      </form>
      <section>
        <h2>Temperature</h2>
        <p class="message"></p>
        <ul class="display"></ul>
      </section>
    </main>
  </body>
</html>
